<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Editor de Certificados PDF - Tiempo Real</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #f5f5f5;
      display: flex;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      margin: 0;
      padding: 0;
    }

    .sidebar {
      width: 400px;
      min-width: 350px;
      max-width: 500px;
      background: white;
      border-right: 1px solid #e0e0e0;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      flex-shrink: 0;
    }

    .sidebar-header {
      padding: 20px;
      background: linear-gradient(135deg, #292561 0%, #3d3a7d 100%);
      color: white;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .sidebar-header h1 {
      font-size: 20px;
      margin-bottom: 15px;
    }

    .hash-input-group {
      display: flex;
      gap: 10px;
    }

    .hash-input-group input {
      flex: 1;
      padding: 10px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.1);
      color: white;
      font-size: 14px;
    }

    .hash-input-group input::placeholder {
      color: rgba(255, 255, 255, 0.6);
    }

    .hash-input-group button {
      padding: 10px 20px;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
    }

    .editor-content {
      padding: 20px;
      flex: 1;
    }

    .section {
      margin-bottom: 25px;
      background: #f9f9f9;
      border-radius: 8px;
      padding: 15px;
      border: 1px solid #e0e0e0;
    }

    .section-title {
      font-size: 16px;
      font-weight: 600;
      color: #292561;
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .field-group {
      margin-bottom: 15px;
    }

    .field-group label {
      display: block;
      font-size: 12px;
      color: #666;
      margin-bottom: 5px;
      font-weight: 500;
    }

    .field-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .field-row.three-cols {
      grid-template-columns: 1fr 1fr 1fr;
    }

    .field-row input {
      padding: 8px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 13px;
    }

    .field-row input:focus {
      outline: none;
      border-color: #292561;
    }

    .color-input {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .color-picker {
      width: 50px;
      height: 35px;
      border: 1px solid #ddd;
      border-radius: 4px;
      cursor: pointer;
    }

    .color-input input[type="number"] {
      flex: 1;
    }

    .viewer-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #e0e0e0;
      min-width: 0;
      /* Permite que el flex funcione correctamente */
      overflow: hidden;
    }

    .viewer-header {
      padding: 15px 20px;
      background: white;
      border-bottom: 1px solid #e0e0e0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
      /* No se encoge */
    }

    .viewer-header h2 {
      font-size: 18px;
      color: #292561;
    }

    .viewer-controls {
      display: flex;
      gap: 10px;
    }

    .viewer-controls button {
      padding: 8px 16px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
    }

    .btn-reload {
      background: #2196F3;
      color: white;
    }

    .btn-reload:hover {
      background: #0b7dda;
    }

    .btn-reset {
      background: #f44336;
      color: white;
    }

    .btn-reset:hover {
      background: #da190b;
    }

    .auto-refresh-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .auto-refresh-toggle input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      background: white;
      min-height: 600px;
    }

    .loading-overlay {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(255, 255, 255, 0.9);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    .loading-overlay.active {
      display: flex;
    }

    .loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      color: #666;
    }

    .loading-spinner {
      border: 4px solid #f3f3f3;
      border-top: 4px solid #292561;
      border-radius: 50%;
      width: 50px;
      height: 50px;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }

    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
      border-bottom: 2px solid #e0e0e0;
    }

    .tab {
      padding: 10px 20px;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      color: #666;
      margin-bottom: -2px;
    }

    .tab.active {
      color: #292561;
      border-bottom-color: #292561;
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }
  </style>
</head>

<body>
  <div class="sidebar">
    <div class="sidebar-header">
      <h1>📝 Editor de Certificados PDF</h1>
      <div class="hash-input-group">
        <input type="text" id="hashInput" placeholder="Hash del certificado (UUID)" value="" />
        <button onclick="loadPDF()">Cargar</button>
      </div>
    </div>
    <div class="editor-content">
      <div class="tabs">
        <button class="tab active" onclick="switchTab('alimentos')">Alimentos</button>
        <button class="tab" onclick="switchTab('otros')">Otros</button>
      </div>

      <!-- Tab Alimentos -->
      <div id="tab-alimentos" class="tab-content active">
        <div class="section">
          <div class="section-title">📋 Nombre del Curso</div>
          <div class="field-group">
            <label>Posición X (centrado = 396)</label>
            <input type="number" id="alimentos-curso-x" value="396" step="0.1" onchange="updatePDF()">
          </div>
          <div class="field-group">
            <label>Posición Y</label>
            <input type="number" id="alimentos-curso-y" value="395" step="0.1" onchange="updatePDF()">
          </div>
          <div class="field-group">
            <label>Tamaño de Fuente</label>
            <input type="number" id="alimentos-curso-fontSize" value="18" step="0.5" onchange="updatePDF()">
          </div>
          <div class="field-group">
            <label>Negrita</label>
            <input type="checkbox" id="alimentos-curso-bold" checked onchange="updatePDF()">
          </div>
          <div class="field-group">
            <label>Color RGB</label>
            <div class="color-input">
              <input type="color" id="alimentos-curso-color-picker" value="#ffffff"
                onchange="updateColorFromPicker('alimentos-curso')">
              <input type="number" id="alimentos-curso-color-r" value="255" min="0" max="255" onchange="updatePDF()">
              <input type="number" id="alimentos-curso-color-g" value="255" min="0" max="255" onchange="updatePDF()">
              <input type="number" id="alimentos-curso-color-b" value="255" min="0" max="255" onchange="updatePDF()">
            </div>
          </div>
        </div>

        <div class="section">
          <div class="section-title">👤 Nombre del Estudiante</div>
          <div class="field-group">
            <label>Posición X (centrado = 396)</label>
            <input type="number" id="alimentos-nombre-x" value="396" step="0.1" onchange="updatePDF()">
          </div>
          <div class="field-group">
            <label>Posición Y</label>
            <input type="number" id="alimentos-nombre-y" value="290" step="0.1" onchange="updatePDF()">
          </div>
          <div class="field-group">
            <label>Tamaño de Fuente</label>
            <input type="number" id="alimentos-nombre-fontSize" value="18" step="0.5" onchange="updatePDF()">
          </div>
          <div class="field-group">
            <label>Color RGB</label>
            <div class="color-input">
              <input type="color" id="alimentos-nombre-color-picker" value="#292561"
                onchange="updateColorFromPicker('alimentos-nombre')">
              <input type="number" id="alimentos-nombre-color-r" value="41" min="0" max="255" onchange="updatePDF()">
              <input type="number" id="alimentos-nombre-color-g" value="37" min="0" max="255" onchange="updatePDF()">
              <input type="number" id="alimentos-nombre-color-b" value="97" min="0" max="255" onchange="updatePDF()">
            </div>
          </div>
        </div>

        <div class="section">
          <div class="section-title">🆔 Documento</div>
          <div class="field-group">
            <label>Posición X</label>
            <input type="number" id="alimentos-documento-x" value="405" step="0.1" onchange="updatePDF()">
          </div>
          <div class="field-group">
            <label>Posición Y</label>
            <input type="number" id="alimentos-documento-y" value="323" step="0.1" onchange="updatePDF()">
          </div>
          <div class="field-group">
            <label>Tamaño de Fuente</label>
            <input type="number" id="alimentos-documento-fontSize" value="18" step="0.5" onchange="updatePDF()">
          </div>
          <div class="field-group">
            <label>Negrita</label>
            <input type="checkbox" id="alimentos-documento-bold" onchange="updatePDF()">
          </div>
        </div>

        <div class="section">
          <div class="section-title">⏱️ Duración</div>
          <div class="field-group">
            <label>Posición X</label>
            <input type="number" id="alimentos-duracion-x" value="440" step="0.1" onchange="updatePDF()">
          </div>
          <div class="field-group">
            <label>Posición Y</label>
            <input type="number" id="alimentos-duracion-y" value="422" step="0.1" onchange="updatePDF()">
          </div>
          <div class="field-group">
            <label>Tamaño de Fuente</label>
            <input type="number" id="alimentos-duracion-fontSize" value="14" step="0.5" onchange="updatePDF()">
          </div>
          <div class="field-group">
            <label>Negrita</label>
            <input type="checkbox" id="alimentos-duracion-bold" onchange="updatePDF()">
          </div>
        </div>

        <div class="section">
          <div class="section-title">📅 Fechas</div>
          <div class="field-group">
            <label>Fecha Emisión X</label>
            <input type="number" id="alimentos-fechaEmision-x" value="310" step="0.1" onchange="updatePDF()">
          </div>
          <div class="field-group">
            <label>Fecha Emisión Y</label>
            <input type="number" id="alimentos-fechaEmision-y" value="437" step="0.1" onchange="updatePDF()">
          </div>
          <div class="field-group">
            <label>Fecha Vencimiento X</label>
            <input type="number" id="alimentos-fechaVencimiento-x" value="570" step="0.1" onchange="updatePDF()">
          </div>
          <div class="field-group">
            <label>Fecha Vencimiento Y</label>
            <input type="number" id="alimentos-fechaVencimiento-y" value="436" step="0.1" onchange="updatePDF()">
          </div>
          <div class="field-group">
            <label>Tamaño de Fuente</label>
            <input type="number" id="alimentos-fechaEmision-fontSize" value="14" step="0.5" onchange="updatePDF()">
          </div>
          <div class="field-group">
            <label>Negrita</label>
            <input type="checkbox" id="alimentos-fechaEmision-bold" onchange="updatePDF()">
          </div>
        </div>

        <div class="section">
          <div class="section-title">📱 Código QR</div>
          <div class="field-group">
            <label>Posición X</label>
            <input type="number" id="alimentos-qr-x" value="688" step="0.1" onchange="updatePDF()">
          </div>
          <div class="field-group">
            <label>Posición Y</label>
            <input type="number" id="alimentos-qr-y" value="448.5" step="0.1" onchange="updatePDF()">
          </div>
          <div class="field-group">
            <label>Tamaño</label>
            <input type="number" id="alimentos-qr-size" value="70" step="1" onchange="updatePDF()">
          </div>
        </div>

        <div class="section">
          <div class="section-title">📄 Pie de Página</div>
          <div class="field-group">
            <label>Posición X (centrado = 396)</label>
            <input type="number" id="alimentos-footer-x" value="396" step="0.1" onchange="updatePDF()">
          </div>
          <div class="field-group">
            <label>Posición Y</label>
            <input type="number" id="alimentos-footer-y" value="590" step="0.1" onchange="updatePDF()">
          </div>
          <div class="field-group">
            <label>Tamaño de Fuente</label>
            <input type="number" id="alimentos-footer-fontSize" value="7" step="0.5" onchange="updatePDF()">
          </div>
          <div class="field-group">
            <label>Negrita</label>
            <input type="checkbox" id="alimentos-footer-bold" checked onchange="updatePDF()">
          </div>
          <div class="field-group">
            <label>Color RGB</label>
            <div class="color-input">
              <input type="color" id="alimentos-footer-color-picker" value="#292561"
                onchange="updateColorFromPicker('alimentos-footer')">
              <input type="number" id="alimentos-footer-color-r" value="41" min="0" max="255" onchange="updatePDF()">
              <input type="number" id="alimentos-footer-color-g" value="37" min="0" max="255" onchange="updatePDF()">
              <input type="number" id="alimentos-footer-color-b" value="97" min="0" max="255" onchange="updatePDF()">
            </div>
          </div>
        </div>
      </div>

      <!-- Tab Otros -->
      <div id="tab-otros" class="tab-content">
        <div class="section">
          <div class="section-title">📱 Código QR</div>
          <div class="field-group">
            <label>Posición X</label>
            <input type="number" id="otros-qr-x" value="493.8" step="0.1" onchange="updatePDF()">
          </div>
          <div class="field-group">
            <label>Posición Y</label>
            <input type="number" id="otros-qr-y" value="377.6" step="0.1" onchange="updatePDF()">
          </div>
          <div class="field-group">
            <label>Tamaño</label>
            <input type="number" id="otros-qr-size" value="70" step="1" onchange="updatePDF()">
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="viewer-container">
    <div class="viewer-header">
      <h2>Vista Previa</h2>
      <div class="viewer-controls">
        <div class="auto-refresh-toggle">
          <input type="checkbox" id="autoRefresh" onchange="toggleAutoRefresh()">
          <label for="autoRefresh">Auto-refresh (3s)</label>
        </div>
        <button class="btn-reload" onclick="reloadPDF()">🔄 Recargar</button>
        <button class="btn-reset" onclick="resetValues()">↺ Reset</button>
      </div>
    </div>
    <div style="position: relative; flex: 1; min-height: 0; overflow: auto;">
      <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"></div>
      </div>
      <iframe id="pdfViewer" style="width: 100%; height: 100%; min-height: 800px;"></iframe>
    </div>
  </div>

  <script>
    const baseUrl = window.location.origin;
    let autoRefreshInterval = null;
    let currentHash = '';

    // Cargar hash desde URL
    const urlParams = new URLSearchParams(window.location.search);
    const hashFromUrl = urlParams.get('hash');
    if (hashFromUrl) {
      document.getElementById('hashInput').value = hashFromUrl;
      loadPDF();
    }

    document.getElementById('hashInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        loadPDF();
      }
    });

    function switchTab(tab) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));

      event.target.classList.add('active');
      document.getElementById(`tab-${tab}`).classList.add('active');
    }

    function updateColorFromPicker(prefix) {
      const picker = document.getElementById(`${prefix}-color-picker`);
      const color = picker.value;
      const r = parseInt(color.substr(1, 2), 16);
      const g = parseInt(color.substr(3, 2), 16);
      const b = parseInt(color.substr(5, 2), 16);

      document.getElementById(`${prefix}-color-r`).value = r;
      document.getElementById(`${prefix}-color-g`).value = g;
      document.getElementById(`${prefix}-color-b`).value = b;

      updatePDF();
    }

    function getElementValue(id, defaultValue = 0) {
      const el = document.getElementById(id);
      return el ? parseFloat(el.value) || defaultValue : defaultValue;
    }

    function getElementChecked(id, defaultValue = false) {
      const el = document.getElementById(id);
      return el ? el.checked : defaultValue;
    }

    function getConfig() {
      return {
        alimentos: {
          cursoNombre: {
            x: getElementValue('alimentos-curso-x', 396),
            y: getElementValue('alimentos-curso-y', 395),
            fontSize: getElementValue('alimentos-curso-fontSize', 18),
            bold: getElementChecked('alimentos-curso-bold', true),
            color: [
              getElementValue('alimentos-curso-color-r', 255),
              getElementValue('alimentos-curso-color-g', 255),
              getElementValue('alimentos-curso-color-b', 255),
            ]
          },
          nombreEstudiante: {
            x: getElementValue('alimentos-nombre-x', 396),
            y: getElementValue('alimentos-nombre-y', 290),
            fontSize: getElementValue('alimentos-nombre-fontSize', 18),
            bold: getElementChecked('alimentos-nombre-bold', true),
            color: [
              getElementValue('alimentos-nombre-color-r', 41),
              getElementValue('alimentos-nombre-color-g', 37),
              getElementValue('alimentos-nombre-color-b', 97),
            ]
          },
          documento: {
            x: getElementValue('alimentos-documento-x', 405),
            y: getElementValue('alimentos-documento-y', 323),
            fontSize: getElementValue('alimentos-documento-fontSize', 18),
            bold: getElementChecked('alimentos-documento-bold', false),
          },
          duracion: {
            x: getElementValue('alimentos-duracion-x', 440),
            y: getElementValue('alimentos-duracion-y', 422),
            fontSize: getElementValue('alimentos-duracion-fontSize', 14),
            bold: getElementChecked('alimentos-duracion-bold', false),
          },
          fechaEmision: {
            x: getElementValue('alimentos-fechaEmision-x', 300),
            y: getElementValue('alimentos-fechaEmision-y', 437),
            fontSize: getElementValue('alimentos-fechaEmision-fontSize', 14),
            bold: getElementChecked('alimentos-fechaEmision-bold', false),
          },
          fechaVencimiento: {
            x: getElementValue('alimentos-fechaVencimiento-x', 570),
            y: getElementValue('alimentos-fechaVencimiento-y', 436),
            fontSize: getElementValue('alimentos-fechaEmision-fontSize', 14),
            bold: getElementChecked('alimentos-fechaEmision-bold', false),
          },
          footer: {
            x: getElementValue('alimentos-footer-x', 396),
            y: getElementValue('alimentos-footer-y', 590),
            fontSize: getElementValue('alimentos-footer-fontSize', 7),
            bold: getElementChecked('alimentos-footer-bold', true),
            color: [
              getElementValue('alimentos-footer-color-r', 41),
              getElementValue('alimentos-footer-color-g', 37),
              getElementValue('alimentos-footer-color-b', 97),
            ]
          },
          qr: {
            x: getElementValue('alimentos-qr-x', 688),
            y: getElementValue('alimentos-qr-y', 448.5),
            size: getElementValue('alimentos-qr-size', 70),
          }
        },
        otros: {
          qr: {
            x: getElementValue('otros-qr-x', 493.8),
            y: getElementValue('otros-qr-y', 377.6),
            size: getElementValue('otros-qr-size', 70),
          }
        }
      };
    }

    function loadPDF() {
      const hash = document.getElementById('hashInput').value.trim();

      if (!hash) {
        alert('Por favor ingresa un hash de certificado válido.');
        return;
      }

      const uuidRegex = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i;
      if (!uuidRegex.test(hash)) {
        alert('El hash debe ser un UUID válido.');
        return;
      }

      currentHash = hash;
      updatePDF();
    }

    function updatePDF() {
      if (!currentHash) return;

      const config = getConfig();
      const configJson = encodeURIComponent(JSON.stringify(config));
      const timestamp = new Date().getTime();
      const pdfUrl = `${baseUrl}/public/certificates/view/${currentHash}?config=${configJson}&t=${timestamp}`;

      console.log('[PDF Editor] Actualizando PDF con config:', config);
      console.log('[PDF Editor] Config JSON:', configJson);
      console.log('[PDF Editor] URL completa:', pdfUrl);

      // Mostrar loading
      document.getElementById('loadingOverlay').classList.add('active');

      // Forzar recarga del iframe limpiando primero el src
      const iframe = document.getElementById('pdfViewer');
      iframe.src = '';

      // Pequeño delay para asegurar que el iframe se limpia completamente
      setTimeout(() => {
        iframe.src = pdfUrl;

        // Ocultar loading después de un tiempo
        iframe.onload = () => {
          document.getElementById('loadingOverlay').classList.remove('active');
        };

        // Timeout de seguridad
        setTimeout(() => {
          document.getElementById('loadingOverlay').classList.remove('active');
        }, 5000);
      }, 100);
    }

    function reloadPDF() {
      if (!currentHash) {
        alert('Primero carga un certificado.');
        return;
      }
      updatePDF();
    }

    function resetValues() {
      if (confirm('¿Restaurar todos los valores por defecto?')) {
        location.reload();
      }
    }

    function toggleAutoRefresh() {
      const checkbox = document.getElementById('autoRefresh');

      if (checkbox.checked) {
        startAutoRefresh();
      } else {
        stopAutoRefresh();
      }
    }

    function startAutoRefresh() {
      stopAutoRefresh();
      autoRefreshInterval = setInterval(() => {
        if (currentHash) {
          updatePDF();
        } else {
          stopAutoRefresh();
        }
      }, 3000);
    }

    function stopAutoRefresh() {
      if (autoRefreshInterval) {
        clearInterval(autoRefreshInterval);
        autoRefreshInterval = null;
      }
    }

    window.addEventListener('beforeunload', () => {
      stopAutoRefresh();
    });
  </script>
</body>

</html>
