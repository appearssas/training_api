<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Visualizador de Certificados PDF - Tiempo Real</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      background: white;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      overflow: hidden;
    }

    .header {
      background: linear-gradient(135deg, #292561 0%, #3d3a7d 100%);
      color: white;
      padding: 20px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 15px;
    }

    .header h1 {
      font-size: 24px;
      font-weight: 600;
    }

    .controls {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .input-group {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .input-group label {
      font-size: 14px;
      font-weight: 500;
    }

    .input-group input {
      padding: 10px 15px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.1);
      color: white;
      font-size: 14px;
      min-width: 300px;
      transition: all 0.3s;
    }

    .input-group input::placeholder {
      color: rgba(255, 255, 255, 0.6);
    }

    .input-group input:focus {
      outline: none;
      border-color: rgba(255, 255, 255, 0.6);
      background: rgba(255, 255, 255, 0.15);
    }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn-primary {
      background: #4CAF50;
      color: white;
    }

    .btn-primary:hover {
      background: #45a049;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(76, 175, 80, 0.4);
    }

    .btn-secondary {
      background: #2196F3;
      color: white;
    }

    .btn-secondary:hover {
      background: #0b7dda;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(33, 150, 243, 0.4);
    }

    .btn-danger {
      background: #f44336;
      color: white;
    }

    .btn-danger:hover {
      background: #da190b;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(244, 67, 54, 0.4);
    }

    .auto-refresh {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(255, 255, 255, 0.1);
      padding: 8px 15px;
      border-radius: 6px;
    }

    .auto-refresh input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
    }

    .auto-refresh label {
      font-size: 14px;
      cursor: pointer;
      user-select: none;
    }

    .viewer-container {
      position: relative;
      width: 100%;
      height: calc(100vh - 200px);
      min-height: 600px;
      background: #f5f5f5;
      border-top: 1px solid #e0e0e0;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      background: white;
    }

    .loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      color: #666;
    }

    .loading-spinner {
      border: 4px solid #f3f3f3;
      border-top: 4px solid #292561;
      border-radius: 50%;
      width: 50px;
      height: 50px;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .error {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      color: #f44336;
      padding: 20px;
      background: #ffebee;
      border-radius: 8px;
      border: 2px solid #f44336;
    }

    .info {
      padding: 15px 30px;
      background: #e3f2fd;
      border-bottom: 1px solid #bbdefb;
      font-size: 13px;
      color: #1976d2;
    }

    .info strong {
      color: #0d47a1;
    }

    @media (max-width: 768px) {
      .header {
        flex-direction: column;
        align-items: stretch;
      }

      .input-group {
        flex-direction: column;
        align-items: stretch;
      }

      .input-group input {
        min-width: 100%;
      }

      .controls {
        flex-direction: column;
      }

      .viewer-container {
        height: calc(100vh - 300px);
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>📄 Visualizador de Certificados PDF</h1>
      <div class="controls">
        <div class="input-group">
          <label for="hashInput">Hash del Certificado:</label>
          <input 
            type="text" 
            id="hashInput" 
            placeholder="Ingresa el hash del certificado (UUID)"
            value=""
          />
        </div>
        <button class="btn-primary" onclick="loadPDF()">
          🔄 Cargar PDF
        </button>
        <button class="btn-secondary" onclick="reloadPDF()">
          🔁 Recargar
        </button>
        <button class="btn-danger" onclick="clearViewer()">
          ✖️ Limpiar
        </button>
        <div class="auto-refresh">
          <input type="checkbox" id="autoRefresh" onchange="toggleAutoRefresh()">
          <label for="autoRefresh">Auto-refresh (5s)</label>
        </div>
      </div>
    </div>
    <div class="info">
      <strong>💡 Tip:</strong> Ingresa el hash del certificado y haz clic en "Cargar PDF". 
      Activa "Auto-refresh" para ver cambios en tiempo real mientras editas el código.
      <strong>URL Base:</strong> <span id="baseUrl"></span>
    </div>
    <div class="viewer-container">
      <div class="loading" id="loading" style="display: none;">
        <div class="loading-spinner"></div>
        <p>Cargando certificado...</p>
      </div>
      <div class="error" id="error" style="display: none;"></div>
      <iframe id="pdfViewer" style="display: none;"></iframe>
    </div>
  </div>

  <script>
    let autoRefreshInterval = null;
    const baseUrl = window.location.origin;

    // Mostrar URL base
    document.getElementById('baseUrl').textContent = `${baseUrl}/public/certificates/view/`;

    // Cargar hash desde URL si existe
    const urlParams = new URLSearchParams(window.location.search);
    const hashFromUrl = urlParams.get('hash');
    if (hashFromUrl) {
      document.getElementById('hashInput').value = hashFromUrl;
      loadPDF();
    }

    // Permitir Enter en el input
    document.getElementById('hashInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        loadPDF();
      }
    });

    function getHash() {
      return document.getElementById('hashInput').value.trim();
    }

    function showLoading() {
      document.getElementById('loading').style.display = 'block';
      document.getElementById('error').style.display = 'none';
      document.getElementById('pdfViewer').style.display = 'none';
    }

    function showError(message) {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('error').style.display = 'block';
      document.getElementById('error').innerHTML = `<strong>❌ Error:</strong><br>${message}`;
      document.getElementById('pdfViewer').style.display = 'none';
    }

    function showPDF() {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('error').style.display = 'none';
      document.getElementById('pdfViewer').style.display = 'block';
    }

    function loadPDF() {
      const hash = getHash();
      
      if (!hash) {
        showError('Por favor ingresa un hash de certificado válido.');
        return;
      }

      // Validar formato UUID básico
      const uuidRegex = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i;
      if (!uuidRegex.test(hash)) {
        showError('El hash debe ser un UUID válido (formato: xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx)');
        return;
      }

      showLoading();

      // Construir URL con timestamp para evitar caché
      const timestamp = new Date().getTime();
      const pdfUrl = `${baseUrl}/public/certificates/view/${hash}?t=${timestamp}`;
      
      const iframe = document.getElementById('pdfViewer');
      
      iframe.onload = () => {
        showPDF();
      };

      iframe.onerror = () => {
        showError('Error al cargar el PDF. Verifica que el hash sea correcto y que el servidor esté funcionando.');
      };

      // Timeout después de 10 segundos
      setTimeout(() => {
        if (document.getElementById('loading').style.display !== 'none') {
          showError('Tiempo de espera agotado. Verifica la conexión y que el hash sea correcto.');
        }
      }, 10000);

      iframe.src = pdfUrl;
    }

    function reloadPDF() {
      const hash = getHash();
      if (!hash) {
        showError('No hay un hash cargado para recargar.');
        return;
      }
      loadPDF();
    }

    function clearViewer() {
      document.getElementById('hashInput').value = '';
      document.getElementById('pdfViewer').src = '';
      document.getElementById('loading').style.display = 'none';
      document.getElementById('error').style.display = 'none';
      document.getElementById('pdfViewer').style.display = 'none';
      stopAutoRefresh();
    }

    function toggleAutoRefresh() {
      const checkbox = document.getElementById('autoRefresh');
      
      if (checkbox.checked) {
        startAutoRefresh();
      } else {
        stopAutoRefresh();
      }
    }

    function startAutoRefresh() {
      stopAutoRefresh(); // Limpiar intervalo anterior si existe
      
      autoRefreshInterval = setInterval(() => {
        const hash = getHash();
        if (hash) {
          console.log('🔄 Auto-refreshing PDF...');
          reloadPDF();
        } else {
          stopAutoRefresh();
        }
      }, 5000); // Refrescar cada 5 segundos
    }

    function stopAutoRefresh() {
      if (autoRefreshInterval) {
        clearInterval(autoRefreshInterval);
        autoRefreshInterval = null;
      }
    }

    // Limpiar al cerrar
    window.addEventListener('beforeunload', () => {
      stopAutoRefresh();
    });
  </script>
</body>
</html>
